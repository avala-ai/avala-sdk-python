[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "avala"
version = "0.1.0"
description = "Official Python SDK for the Avala API"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{name = "Avala Developer", email = "developer@avala.ai"}]
dependencies = ["httpx>=0.24,<1", "pydantic>=2.0,<3"]

[project.optional-dependencies]
dev = ["pytest>=7", "respx>=0.20", "mypy>=1", "ruff>=0.1"]

[tool.ruff]
line-length = 120

[tool.mypy]
strict = true
